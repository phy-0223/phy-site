<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>phy · 个人门户</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in-up': 'fadeInUp 1.05s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in-slow': 'fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
    body.menu-open {
      overflow: hidden;
    }
    .glass-nav {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .anim-hidden {
      opacity: 0;
    }

    /* 增强亮度的背景层 */
    #cosmic-bg .cosmic-blob {
      border-radius: 50%;
      filter: blur(70px);
      -webkit-filter: blur(70px);
      will-change: transform, opacity;
      mix-blend-mode: screen;
    }
    @keyframes nebula-float-a {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.6; }
      50% { transform: translate3d(10vw, 5vh, 0) scale(1.1); opacity: 0.8; }
    }
    @keyframes nebula-float-b {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate3d(-8vw, -10vh, 0) scale(1.2); opacity: 0.7; }
    }
  </style>
</head>
<!-- 调亮后的底色：Slate-900 变更为更浅的色调 -->
<body class="relative min-h-screen overflow-x-hidden bg-[#1e293b] text-white antialiased selection:bg-blue-500/30">

  <!-- 动态亮色背景 -->
  <div id="cosmic-bg" class="pointer-events-none fixed inset-0 z-0 overflow-hidden" aria-hidden="true">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_130%_90%_at_50%_45%,#334155_0%,#1e293b_60%,#0f172a_100%)]"></div>
    
    <!-- 明亮的星云色块 -->
    <div class="cosmic-blob absolute -left-[5%] top-[10%] h-[500px] w-[500px] bg-[radial-gradient(circle,rgba(99,102,241,0.6)_0%,transparent_70%)]" style="animation: nebula-float-a 40s ease-in-out infinite"></div>
    <div class="cosmic-blob absolute -right-[5%] bottom-[10%] h-[600px] w-[600px] bg-[radial-gradient(circle,rgba(45,212,191,0.5)_0%,transparent_70%)]" style="animation: nebula-float-b 50s ease-in-out infinite"></div>
    <div class="cosmic-blob absolute left-[25%] top-[25%] h-[400px] w-[400px] bg-[radial-gradient(circle,rgba(192,132,252,0.5)_0%,transparent_70%)]" style="animation: nebula-float-a 60s ease-in-out infinite; animation-delay: -5s"></div>
  </div>

  <div class="relative z-10">
    <!-- 导航 -->
    <header class="fixed inset-x-0 top-0 z-50 glass-nav border-b border-white/10">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="#" class="text-lg font-black tracking-tighter text-white">PHY.SITE</a>
        <ul class="hidden md:flex gap-8 text-sm font-bold text-white/70">
          <li><a href="#intro" class="hover:text-white transition">HOME</a></li>
          <li><a href="#tech" class="hover:text-white transition">TECH</a></li>
          <li><a href="#works" class="hover:text-white transition">WORK</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <!-- 英雄区：重点修改了头像部分 -->
      <section id="intro" class="min-h-screen flex items-center px-6 pt-20">
        <div class="mx-auto max-w-6xl w-full flex flex-col md:flex-row items-center gap-16">
          
          <!-- 头像容器：放大 Miku -->
          <div class="anim-hidden animate-fade-in-up relative">
            <div class="h-64 w-64 md:h-80 md:w-80 overflow-hidden rounded-3xl border-4 border-white/20 shadow-[0_0_50px_rgba(255,255,255,0.1)]">
              <!-- scale-150 让图片内的内容放大，object-center 确保居中 -->
              <img 
                src="https://phy-0223.github.io/phy-site/me.png" 
                alt="Miku" 
                class="h-full w-full object-cover scale-[1.6] transition duration-700 hover:scale-[1.8]"
              />
            </div>
            <!-- 装饰性光晕 -->
            <div class="absolute -inset-4 bg-blue-500/20 blur-3xl rounded-full -z-10"></div>
          </div>

          <div class="space-y-8 text-center md:text-left">
            <h1 class="anim-hidden animate-fade-in-up text-6xl md:text-8xl font-black tracking-tighter [animation-delay:200ms]">
              HELLO, <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">I'M PHY.</span>
            </h1>
            <p class="anim-hidden animate-fade-in-up text-xl text-white/70 max-w-lg leading-relaxed [animation-delay:400ms]">
              背景已调亮，头像中的 Miku 已放大处理。这是一个更明亮、更专注本质的个人空间。
            </p>
          </div>
        </div>
      </section>

      <!-- 简单占位部分：技术栈 -->
      <section id="tech" class="py-32 px-6">
        <div class="mx-auto max-w-6xl">
          <div class="h-px w-full bg-gradient-to-r from-transparent via-white/20 to-transparent mb-20"></div>
          <h2 class="reveal anim-hidden text-4xl font-black mb-12">技术与工具</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="reveal anim-hidden p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Python</div>
            <div class="reveal anim-hidden p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Tailwind</div>
            <div class="reveal anim-hidden p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Design</div>
            <div class="reveal anim-hidden p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition">Creative</div>
          </div>
        </div>
      </section>
    </main>
  </div>

    (function () {

            }

        { threshold: 0.1 }
      );
      document.querySelectorAll('.reveal').forEach(function (el) {
        observer.observe(el);
      });

  </script>
</body>
</html>
